<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLOTEX — Clothes Textile · نظام إدارة مستودعات الأقمشة</title>
    <link rel="icon" type="image/png" href="./clotex-logo.png" />
    <link rel="apple-touch-icon" href="./clotex-logo.png" />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('fabric-erp-ui-preferences');
          if (!raw) return;
          var p = JSON.parse(raw);
          var st = p.state || p;
          if (st.appearance === 'dark') document.documentElement.dataset.appearance = 'dark';
          if (st.themeId) document.documentElement.dataset.theme = st.themeId;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
