<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALamal-AB · الامل.AB — نظام إدارة جملة الأقمشة</title>
    <link rel="icon" type="image/png" href="./alamal-logo.png" />
    <link rel="apple-touch-icon" href="./alamal-logo.png" />
    <script>
      (function () {
        function fallback() {
          return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
            var r = (Math.random() * 16) | 0;
            var v = c === 'x' ? r : (r & 3) | 8;
            return v.toString(16);
          });
        }
        try {
          var c = window.crypto;
          if (!c) {
            window.crypto = { randomUUID: fallback };
            return;
          }
          if (typeof c.randomUUID !== 'function') {
            c.randomUUID = fallback;
          }
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('obada-erp-ui-preferences');
          if (!raw) return;
          var p = JSON.parse(raw);
          var st = p.state || p;
          if (st.appearance === 'dark') document.documentElement.dataset.appearance = 'dark';
          if (st.themeId) document.documentElement.dataset.theme = st.themeId;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
