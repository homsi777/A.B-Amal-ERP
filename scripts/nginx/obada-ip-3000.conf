# ALamal-AB Obada — NAT / Proxmox workaround
# External browser: http://PUBLIC_HOST:WEB_PORT  (مثال 65.21.136.217:2730)
# Port forward on router/Proxmox often maps: WEB_PORT -> NAT_PORT (3000)
# This block serves Obada on NAT_PORT for the public IP only.
# abooerp.org blocks on the same port keep their own server_name.

server {
    listen NAT_PORT default_server;
    server_name PUBLIC_HOST;

    root NGINX_ROOT;
    index index.html;

    client_max_body_size 50m;

    # Safety net if an old build still requests /api/api/...
    location ^~ /api/api/ {
        proxy_pass http://127.0.0.1:API_PORT/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:API_PORT/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
